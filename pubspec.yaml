name: cityflow_flutter
description: Navigation, community guide, and city services app for Redemption City.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  dio: ^5.7.0
  shared_preferences: ^2.3.3
  mhj_maps: any
  geolocator: ^13.0.2
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.16
  intl: ^0.20.1
  lottie: ^3.1.3
  flutter_dotenv: ^5.2.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/redemption_city_logo.png
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - assets/data/
    - assets/.env
